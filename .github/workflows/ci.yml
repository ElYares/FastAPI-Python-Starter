name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            requirements/test.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt -r requirements/dev.txt -r requirements/test.txt

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Security Scan
        run: make security
